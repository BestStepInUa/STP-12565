<section class="gallery-section" id="gallery">
  <div class="container gallery-wrapper">
    <h2 class="gallery-title">Gallery</h2>
    <p class="gallery-desc">Color and motion</p>

    <div class="gallery-slider-box">
      <div class="swiper gallery-swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <picture>
              <source
                media="(max-width: 1439px)"
                srcset="
                  ./img/gallery/m_gallery_slide01.png    1x,
                  ./img/gallery/m_gallery_slide01@2x.png 2x
                "
              />
              <img
                src="./img/gallery/gallery_slide01.png"
                alt="Girl helps dog"
                srcset="
                  ./img/gallery/gallery_slide01.png    1x,
                  ./img/gallery/gallery_slide01@2x.png 2x
                "
                width="169"
                height="225"
              />
            </picture>
          </div>

          <div class="swiper-slide">
            <picture>
              <source
                media="(max-width: 1439px)"
                srcset="
                  ./img/gallery/m_gallery_slide02.png    1x,
                  ./img/gallery/m_gallery_slide02@2x.png 2x
                "
              />
              <img
                src="./img/gallery/gallery_slide02.png"
                alt="Gallery image"
                srcset="
                  ./img/gallery/gallery_slide02.png    1x,
                  ./img/gallery/gallery_slide02@2x.png 2x
                "
                width="169"
                height="225"
              />
            </picture>
          </div>

          <div class="swiper-slide">
            <picture>
              <source
                media="(max-width: 1439px)"
                srcset="
                  ./img/gallery/m_gallery_slide03.png    1x,
                  ./img/gallery/m_gallery_slide03@2x.png 2x
                "
              />
              <img
                src="./img/gallery/gallery_slide03.png"
                alt="Gallery image"
                srcset="
                  ./img/gallery/gallery_slide03.png    1x,
                  ./img/gallery/gallery_slide03@2x.png 2x
                "
                width="169"
                height="225"
              />
            </picture>
          </div>

          <div class="swiper-slide">
            <picture>
              <source
                media="(max-width: 1439px)"
                srcset="
                  ./img/gallery/m_gallery_slide04.png    1x,
                  ./img/gallery/m_gallery_slide04@2x.png 2x
                "
              />
              <img
                src="./img/gallery/gallery_slide04.png"
                alt="Gallery image"
                srcset="
                  ./img/gallery/gallery_slide04.png    1x,
                  ./img/gallery/gallery_slide04@2x.png 2x
                "
                width="169"
                height="225"
              />
            </picture>
          </div>

          <div class="swiper-slide">
            <picture>
              <source
                media="(max-width: 1439px)"
                srcset="
                  ./img/gallery/m_gallery_slide05.png    1x,
                  ./img/gallery/m_gallery_slide05@2x.png 2x
                "
              />
              <img
                src="./img/gallery/gallery_slide05.png"

                srcset="
                  ./img/gallery/gallery_slide05.png    1x,
                  ./img/gallery/gallery_slide05@2x.png 2x
                "
                width="169"
                height="225"
              />
            </picture>
          </div>
        </div>
      </div>

      <div class="arrow-buttons">
        <button
          class="button-prev"
          type="button"
          aria-label="Previous slide"
        >
          <svg class="btn-arrow">
            <use href="/img/SVG/sprite.svg#icon-back-mobile"></use>
          </svg>
        </button>

        <button
          class="button-next"
          type="button"
          aria-label="Next slide"
        >
          <svg class="btn-arrow">
            <use href="/img/SVG/sprite.svg#icon-back-mobile"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
